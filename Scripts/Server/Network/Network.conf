# ============================================================
# network.conf — Configuration file for auto_network.sh
# ============================================================
# Edit this file to match your environment.
# The script will source it automatically.
# ============================================================

# Network interface to configure
INTERFACE="eth0"

# Netplan config file to write
CONFIG_FILE="/etc/netplan/50-cloud-init.yaml"

# DNS servers (used for all static configs)
DNS="[1.1.1.1, 8.8.8.8]"

# ============================================================
# NETWORK DEFINITIONS
# Define as many networks as you want.
# Each network needs:
#   PROBE_x     → IP used temporarily to ping the gateway
#   GATEWAY_x   → Gateway to ping to detect the network
#   STATIC_IP_x → Static IP to assign if network is detected
# Where x is a number: 1, 2, 3, ...
# ============================================================

# --- Network 1 ---
PROBE_1="10.0.0.254/8"
GATEWAY_1="10.0.0.1"
STATIC_IP_1="10.100.0.20/8"

# --- Network 2 ---
PROBE_2="192.168.1.254/24"
GATEWAY_2="192.168.1.1"
STATIC_IP_2="192.168.1.251/24"

# --- Network 3 (example, uncomment to enable) ---
# PROBE_3="172.16.0.254/24"
# GATEWAY_3="172.16.0.1"
# STATIC_IP_3="172.16.0.50/24"

# ============================================================
# Ping settings
# ============================================================
PING_COUNT=3
PING_TIMEOUT=2
